name: CI — kit-core

on:
  push:
    paths:
      - "kit-core/**"
      - ".github/workflows/ci-core.yml"
  pull_request:
    paths:
      - "kit-core/**"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e kit-core[dev]

      - name: Run tests
        run: pytest kit-core/tests/ -v
        env:
          KIT_REDIS_URL: redis://localhost:6379/0

      - name: Lint
        run: |
          pip install ruff
          ruff check kit-core/
